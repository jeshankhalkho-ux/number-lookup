<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Number Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080B14;--surface:#0F1220;--tint:#4F8EF7;--success:#22D3A5;--error:#FF5A6A;--warn:#F5A623;--text:#fff;--muted:#5A607A;--border:#1A2035}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.screen{display:none;width:100%;max-width:440px}
.screen.active{display:block}
#home{max-width:620px}
.center{text-align:center}
.emoji{font-size:52px;display:block;margin-bottom:12px}
h1{font-size:26px;font-weight:700}
.sub{font-size:14px;color:var(--muted);margin-top:6px}
.card{background:var(--surface);border-radius:20px;padding:28px;border:1px solid var(--border);margin-top:28px}
.card h2{font-size:19px;font-weight:700;margin-bottom:8px;text-align:center}
.card p{font-size:14px;color:var(--muted);text-align:center;margin-bottom:22px;line-height:1.6}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:border-color .2s}
input:focus{border-color:var(--tint)}
input::placeholder{color:var(--muted)}
button{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .2s}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-blue{background:var(--tint);color:#fff}
.btn-red{background:var(--error);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--muted);color:var(--muted);margin-top:10px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--tint);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
.spinner.green{border-top-color:var(--success)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease}
.req-id{font-size:12px;color:var(--muted);margin-bottom:18px;font-family:monospace}

.home-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.home-header h1{font-size:21px}
.right-col{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.timer{border:1px solid var(--success);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--success);transition:color .3s,border-color .3s}
.btn-sm{width:auto;padding:6px 14px;background:transparent;border:1px solid var(--muted);color:var(--muted);border-radius:8px;font-size:13px}
.search-row{display:flex;gap:10px;margin-bottom:8px}
.search-row input{margin-bottom:0;flex:1}
.btn-search{width:auto;padding:14px 20px;background:var(--tint);color:#fff;border-radius:12px;white-space:nowrap;border:none;font-weight:600;font-size:15px;cursor:pointer}
.btn-search:disabled{opacity:.5}
.err{color:var(--error);font-size:13px;margin-bottom:12px}

.rcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.rcard-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.badge{background:rgba(79,142,247,.13);color:var(--tint);font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.rname{font-size:17px;font-weight:700}
.divider{height:1px;background:var(--border);margin-bottom:12px}
.row{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;font-size:13px}
.lbl{color:var(--muted);font-weight:600;min-width:80px}
.val{color:var(--text);text-align:right;word-break:break-word}

.skel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
.sl{background:#1E2640;border-radius:4px;height:13px;margin-bottom:10px}
.srow{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}

.msg{text-align:center;margin-top:50px;color:var(--muted)}
.msg .big{font-size:44px;display:block;margin-bottom:12px}
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="center">
    <span class="emoji">🔍</span>
    <h1>Number Lookup</h1>
    <p class="sub">Secure access required</p>
  </div>

  <div class="card">
    <h2>Enter Access Key</h2>
    <p>Type your secret key to access</p>
    <input id="key-inp" type="password" placeholder="Secret key..."/>
    <button class="btn-blue" id="btn-login">Login →</button>
  </div>
</div>

<div id="home" class="screen">
  <div class="home-header">
    <div>
      <h1>🔍 Number Lookup</h1>
      <p class="sub">Search any phone number</p>
    </div>
    <div class="right-col">
      <div class="timer" id="timer">⏱ 01:00</div>
      <button class="btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="search-row">
    <input id="num-inp" type="tel" placeholder="Enter 10-digit number..." maxlength="10"/>
    <button class="btn-search" id="btn-search" onclick="search()">Search</button>
  </div>
  <div class="err" id="serr"></div>
  <div id="results"></div>
</div>

<script>
var API = "https://number-lookup.onrender.com";
var countTimer = null;
var secs = 60;

document.getElementById("key-inp").addEventListener("keydown", function(e){ if(e.key==="Enter") login(); });
document.getElementById("btn-login").addEventListener("click", login);

function login() {
  var key = document.getElementById("key-inp").value;
  if (key !== "Jishan15") {
    var inp = document.getElementById("key-inp");
    inp.classList.remove("shake");
    void inp.offsetWidth;
    inp.classList.add("shake");
    return;
  }
  document.getElementById("login").classList.remove("active");
  document.getElementById("home").classList.add("active");
  startCountdown();
}

function logout() {
  clearInterval(countTimer);
  document.getElementById("home").classList.remove("active");
  document.getElementById("login").classList.add("active");
  document.getElementById("results").innerHTML = "";
  document.getElementById("num-inp").value = "";
  document.getElementById("key-inp").value = "";
}

function startCountdown() {
  secs = 60;
  tick();
  countTimer = setInterval(function(){
    secs--;
    tick();
    if (secs <= 0) { clearInterval(countTimer); logout(); }
  }, 1000);
}

function tick() {
  var m = String(Math.floor(secs/60)).padStart(2,"0");
  var s = String(secs%60).padStart(2,"0");
  var el = document.getElementById("timer");
  el.textContent = "⏱ " + m + ":" + s;
  if (secs <= 30)      { el.style.color="var(--error)";   el.style.borderColor="var(--error)"; }
  else if (secs <= 60) { el.style.color="var(--warn)";    el.style.borderColor="var(--warn)"; }
  else                 { el.style.color="var(--success)"; el.style.borderColor="var(--success)"; }
}

document.getElementById("num-inp").addEventListener("keydown", function(e){ if(e.key==="Enter") search(); });

async function search() {
  var number = document.getElementById("num-inp").value.trim();
  var errEl  = document.getElementById("serr");
  var resEl  = document.getElementById("results");
  var btn    = document.getElementById("btn-search");

  errEl.textContent = "";
  if (!number || number.length < 10) { errEl.textContent = "Enter a valid 10-digit number"; return; }

  btn.disabled = true;
  resEl.innerHTML = skelHTML() + skelHTML() + skelHTML();

  try {
    var data = await fetch(API + "/api/lookup?number=" + number).then(function(r){ return r.json(); });

    var results = data.results ? Object.values(data.results) : [];
    if (!data.status || results.length === 0) {
      resEl.innerHTML = '<div class="msg"><span class="big">📭</span><p>No results found</p></div>';
      btn.disabled = false;
      return;
    }

    var html = "";
    for (var i = 0; i < results.length; i++) {
      html += makeCard(i + 1, results[i]);
    }
    resEl.innerHTML = html;
  } catch(e) {
    errEl.textContent = "Failed to fetch. Try again.";
    resEl.innerHTML = "";
  }
  btn.disabled = false;
}

function makeCard(idx, r) {
  var rows = [
    ["Name",        r.name],
    ["Father",      r.father_name],
    ["Mobile",      r.mobile],
    ["Alt Mobile",  r.alt_mobile],
    ["Operator",    r.operator],
    ["State",       r.state_circle],
    ["Address",     r.address],
    ["Email",       r.email],
    ["Aadhar",      r.aadhar_number],
  ].filter(function(x){ return x[1] && String(x[1]).trim() !== "" && x[1] !== "n/a"; })
   .map(function(x){
     return '<div class="row"><span class="lbl">'+x[0]+'</span><span class="val">'+x[1]+'</span></div>';
   }).join("");

  return '<div class="rcard">' +
    '<div class="rcard-head"><span class="badge">#'+idx+'</span><span class="rname">'+(r.name||r.mobile||"Unknown")+'</span></div>' +
    '<div class="divider"></div>' + rows + '</div>';
}

function skelHTML() {
  return '<div class="skel">' +
    '<div class="srow"><div style="background:#1E2640;border-radius:6px;width:32px;height:20px"></div><div style="background:#1E2640;border-radius:6px;height:18px;flex:1;margin-left:10px"></div></div>' +
    '<div class="divider"></div>' +
    ['80%','65%','90%','70%','55%'].map(function(w){
      return '<div class="srow"><div class="sl" style="width:70px"></div><div class="sl" style="width:'+w+'"></div></div>';
    }).join("") + '</div>';
}
</script>
</body>
</html>
